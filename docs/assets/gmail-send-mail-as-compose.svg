<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Gmail compose From selector</title>
  <desc id="desc">Screenshot-style diagram of choosing the custom From address in Gmail compose.</desc>
  <rect width="920" height="560" fill="#f3f4f6"/>
  <rect x="140" y="72" width="640" height="430" rx="12" fill="#fff" stroke="#dadce0"/>
  <rect x="140" y="72" width="640" height="52" rx="12" fill="#f1f3f4"/>
  <text x="166" y="105" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#202124">New Message</text>
  <line x1="140" y1="124" x2="780" y2="124" stroke="#dadce0"/>
  <text x="166" y="164" font-family="Arial, sans-serif" font-size="15" fill="#5f6368">From</text>
  <rect x="228" y="142" width="330" height="34" rx="4" fill="#fff" stroke="#dadce0"/>
  <text x="242" y="164" font-family="Arial, sans-serif" font-size="15" fill="#202124">Alex Miller &lt;gmail@example.com&gt;</text>
  <path d="M534 155 l7 8 l7 -8" fill="none" stroke="#5f6368" stroke-width="2"/>
  <text x="166" y="214" font-family="Arial, sans-serif" font-size="15" fill="#5f6368">To</text>
  <line x1="140" y1="232" x2="780" y2="232" stroke="#e8eaed"/>
  <text x="166" y="270" font-family="Arial, sans-serif" font-size="15" fill="#5f6368">Subject</text>
  <line x1="140" y1="290" x2="780" y2="290" stroke="#e8eaed"/>
  <rect x="228" y="176" width="330" height="92" rx="4" fill="#fff" stroke="#dadce0"/>
  <text x="246" y="207" font-family="Arial, sans-serif" font-size="15" fill="#202124">Alex Miller &lt;alex@gmail.com&gt;</text>
  <text x="246" y="241" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#202124">Alex Miller &lt;gmail@example.com&gt;</text>
  <rect x="166" y="440" width="96" height="38" rx="18" fill="#1a73e8"/>
  <text x="196" y="464" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">Send</text>
</svg>
