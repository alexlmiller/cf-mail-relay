name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.release_created }}
      tag: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
          # Unified semver across relay, Worker, and UI.

  docker-push-relay:
    needs: release-please
    if: needs.release-please.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: docker buildx bake and push
        working-directory: relay
        env:
          REGISTRY_IMAGE: ghcr.io/${{ github.repository }}/relay
          VERSION: ${{ needs.release-please.outputs.tag }}
        run: docker buildx bake --push --set relay.tags="$REGISTRY_IMAGE:$VERSION,$REGISTRY_IMAGE:latest"

