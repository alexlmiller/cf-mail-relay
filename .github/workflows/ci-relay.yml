name: CI — relay

on:
  push:
    paths:
      - "relay/**"
      - ".github/workflows/ci-relay.yml"
  pull_request:
    paths:
      - "relay/**"
      - ".github/workflows/ci-relay.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: relay/go.sum
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race -count=1 ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: docker build (no push)
        run: docker buildx build --platform linux/amd64,linux/arm64 -f relay/Dockerfile relay/
