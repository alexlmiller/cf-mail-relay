name: CI - OpenTofu

on:
  push:
    paths:
      - "infra/opentofu/**"
      - ".github/workflows/ci-opentofu.yml"
  pull_request:
    paths:
      - "infra/opentofu/**"
      - ".github/workflows/ci-opentofu.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0
        with:
          tofu_version: 1.11.5
          tofu_wrapper: false
      - run: tofu -chdir=infra/opentofu fmt -check -recursive
      - run: tofu -chdir=infra/opentofu init -backend=false -lockfile=readonly
      - run: tofu -chdir=infra/opentofu validate
