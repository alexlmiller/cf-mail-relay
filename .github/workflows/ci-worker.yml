name: CI — worker

on:
  push:
    paths:
      - "worker/**"
      - "shared/**"
      - ".github/workflows/ci-worker.yml"
      - "pnpm-lock.yaml"
  pull_request:
    paths:
      - "worker/**"
      - "shared/**"
      - ".github/workflows/ci-worker.yml"
      - "pnpm-lock.yaml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter worker typecheck
      - run: pnpm --filter worker test
      - run: pnpm --filter ui build
      - name: prepare wrangler dry-run config
        run: cp worker/wrangler.toml.example worker/wrangler.toml
      - name: wrangler deploy --dry-run
        run: pnpm --filter worker exec wrangler deploy --dry-run --outdir=.wrangler/build
