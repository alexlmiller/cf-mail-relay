name: CI — worker

on:
  push:
    paths:
      - "worker/**"
      - "shared/**"
      - ".github/workflows/ci-worker.yml"
      - "pnpm-lock.yaml"
  pull_request:
    paths:
      - "worker/**"
      - "shared/**"
      - ".github/workflows/ci-worker.yml"
      - "pnpm-lock.yaml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter worker typecheck
      - run: pnpm --filter worker test
      - name: prepare wrangler dry-run config
        run: cp worker/wrangler.toml.example worker/wrangler.toml
      - name: wrangler deploy --dry-run
        run: pnpm --filter worker exec wrangler deploy --dry-run --outdir=.wrangler/build
