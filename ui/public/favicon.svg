<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="CF Mail Relay">
  <style>
    .bg { fill: #0F1115; }
    .fg { stroke: #FAFAFA; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #FAFAFA; }
      .fg { stroke: #0F1115; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="6" />
  <g class="fg" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <!-- Envelope body whose right edge tapers into a forward-pointing arrowhead. -->
    <path d="M5 10 L22 10 L27 16 L22 22 L5 22 Z" />
    <!-- Inner flap fold from the top corners to the body's centerline. -->
    <path d="M5 10 L13.5 16 L22 10" />
  </g>
</svg>
