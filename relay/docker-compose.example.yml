# Example standalone relay deployment.
# Pair with a sidecar (lego, certbot, Caddy, Traefik) that writes
# /tls/fullchain.pem and /tls/privkey.pem.
#
# Production-oriented variants ship in infra/docker/.

services:
  relay:
    image: ghcr.io/alexlmiller/cf-mail-relay/relay:latest
    container_name: cf-mail-relay
    restart: unless-stopped
    ports:
      - "587:587"
    environment:
      RELAY_DOMAIN: smtp.example.com
      RELAY_WORKER_URL: https://mail-api.example.com
      RELAY_KEY_ID: rel_REPLACE_ME
      RELAY_HMAC_SECRET: REPLACE_ME
      RELAY_TLS_CERT_FILE: /tls/fullchain.pem
      RELAY_TLS_KEY_FILE: /tls/privkey.pem
    volumes:
      - ./tls:/tls:ro
    healthcheck:
      test: ["CMD", "/relay", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
